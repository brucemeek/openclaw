name: Deploy to Lightsail

on:
  push:
    branches:
      - main

concurrency:
  group: lightsail-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
      LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        if: ${{ env.LIGHTSAIL_HOST != '' && env.LIGHTSAIL_USER != '' && env.LIGHTSAIL_SSH_KEY != '' }}
        with:
          host: ${{ env.LIGHTSAIL_HOST }}
          username: ${{ env.LIGHTSAIL_USER }}
          key: ${{ env.LIGHTSAIL_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH="$HOME/.npm-global/bin:$PATH"
            cd /home/ec2-user/openclaw-src
            REPO_URL="${{ github.server_url }}/${{ github.repository }}.git"
            git fetch "$REPO_URL" main
            git checkout main
            git merge --ff-only FETCH_HEAD
            pnpm install --frozen-lockfile
            pnpm build
            pnpm ui:build
            npm install -g .
            sudo systemctl restart openclaw-gateway.service